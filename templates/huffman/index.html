{% extends "layout.html" %}

{% block title %}Huffman Coding - AlgoViz Pro{% endblock %}

{% block content %}
<div class="huffman-container">

    <div class="huffman-hero">
        <h1 class="huffman-title">Huffman Coding</h1>
        <p class="huffman-subtitle">Optimal Variable-Length Compression</p>
    </div>

    <div class="huffman-tool-card" style="margin-top:20px; padding:30px; background:#1e293b; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
        <textarea 
            id="text_input" 
            placeholder="Enter text to encode or decode..." 
            style="width: 100%; height: 120px; padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); color: white; margin-bottom: 20px; font-size:16px;"
            autocomplete="off"
        ></textarea>
        
        <div style="display:flex; gap:15px; align-items:center;">
            <button id="btn_animate" class="btn btn-primary" disabled style="padding: 12px 24px; font-weight:bold; transition:all 0.2s;">
                <i class="fas fa-film" style="margin-right: 8px;"></i> Animate Step-by-Step
            </button>
            <button id="btn_encode" class="btn btn-secondary" disabled style="padding: 12px 24px; transition:all 0.2s;">
                <i class="fas fa-lock" style="margin-right: 8px;"></i> Encode
            </button>
            <button id="btn_decode" class="btn btn-secondary" disabled style="padding: 12px 24px; transition:all 0.2s;">
                <i class="fas fa-unlock" style="margin-right: 8px;"></i> Decode
            </button>
        </div>
    </div>

</div>

<script>
    const textarea = document.getElementById('text_input');
    const btnAnimate = document.getElementById('btn_animate');
    const btnEncode = document.getElementById('btn_encode');
    const btnDecode = document.getElementById('btn_decode');

    textarea.addEventListener('input', () => {
        const isEmpty = textarea.value.trim() === '';
        btnAnimate.disabled = isEmpty;
        btnEncode.disabled = isEmpty;
        btnDecode.disabled = isEmpty;
        
        const opacity = isEmpty ? '0.5' : '1';
        const cursor = isEmpty ? 'not-allowed' : 'pointer';
        
        [btnAnimate, btnEncode, btnDecode].forEach(btn => {
            btn.style.opacity = opacity;
            btn.style.cursor = cursor;
        });
    });
    
    // Trigger evaluation on load
    textarea.dispatchEvent(new Event('input'));

    btnEncode.addEventListener('click', async () => {
        try {
            const res = await fetch('/huffman/encode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: textarea.value.trim() })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            
            localStorage.setItem('huffman_result', JSON.stringify({ action: 'Encoding', ...data }));
            window.location.href = '/huffman/result';
        } catch (e) {
            alert('Request Failed: ' + e.message);
        }
    });

    btnDecode.addEventListener('click', async () => {
        try {
            const res = await fetch('/huffman/decode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ encoded: textarea.value.trim() })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            
            localStorage.setItem('huffman_result', JSON.stringify({ action: 'Decoding', output: data.decoded }));
            window.location.href = '/huffman/result';
        } catch (e) {
            alert('Request Failed: ' + e.message);
        }
    });

    btnAnimate.addEventListener('click', async () => {
        try {
            const res = await fetch('/huffman/encode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: textarea.value.trim() })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            
            localStorage.setItem('huffman_steps', JSON.stringify(data.steps));
            window.location.href = '/huffman/visualize';
        } catch (e) {
            alert('Request Failed: ' + e.message);
        }
    });
</script>
{% endblock %}
