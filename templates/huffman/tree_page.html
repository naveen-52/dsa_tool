{% extends "layout.html" %}
{% block content %}

<h2>Huffman Tree</h2>

    <div class="card-modern">
        <h3>Huffman Tree Visualization</h3>

        <div style="text-align:center; margin-top:20px;">
            {% if tree_image %}
                <img src="data:image/png;base64,{{ tree_image }}" 
                     style="max-width:100%; border-radius:12px;">
            {% else %}
                <p>No tree available</p>
            {% endif %}
        </div>
    </div>

<div id="tree" style="position:relative;height:400px;">
    <div id="edges" style="position:absolute;width:100%;height:100%;z-index:1;"></div>
    <div id="nodes" style="position:absolute;width:100%;height:100%;z-index:2;"></div>
</div>
<script>

async function loadTree() {
    let text = localStorage.getItem("huffman_input");

    try {
        text = JSON.parse(text);
    } catch {}

    const res = await fetch("/huffman-api", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
    });

    const data = await res.json();

    drawTree(data.steps);
}

function createNode(id, label, x, y) {
    const node = document.createElement("div");

    node.innerText = label;

    // 🔥 POSITIONING (IMPORTANT)
    node.style.position = "absolute";
    node.style.left = x + "px";
    node.style.top = y + "px";

    // 🔥 UI STYLE
    node.style.width = "55px";
    node.style.height = "55px";
    node.style.borderRadius = "50%";

    node.style.display = "flex";
    node.style.alignItems = "center";
    node.style.justifyContent = "center";

    node.style.background = "#6366f1";
    node.style.color = "white";
    node.style.border = "4px solid #4338ca";
    node.style.zIndex = "10";
    node.style.fontSize = "18px";
    node.style.fontWeight = "600";

    node.style.boxShadow = "0 10px 20px rgba(0,0,0,0.2)";
    node.style.transition = "all 0.3s ease";

    node.style.transform = "translate(-50%, -50%) scale(0.5)";
    node.style.opacity = "0";

    if (y < 150) {
    node.style.background = "#ef4444"; // root highlight
}

    // 🔥 ANIMATION
    setTimeout(() => {
        node.style.transform = "translate(-50%, -50%) scale(1)";
        node.style.opacity = "1";
    }, 100);

    // 🔥 HOVER EFFECT
    node.onmouseover = () => {
        node.style.transform = "translate(-50%, -50%) scale(1.1)";
    };

    node.onmouseout = () => {
        node.style.transform = "translate(-50%, -50%) scale(1)";
    };

document.getElementById("nodes").appendChild(node);

}

function drawLine(x1, y1, x2, y2) {
    const line = document.createElement("div");

    const radius = 27; // half of node size (55px / 2)

    const dx = x2 - x1;
    const dy = y2 - y1;

    const angle = Math.atan2(dy, dx);

    // 🔥 SHIFT START POINT TO EDGE OF NODE
    const startX = x1 + radius * Math.cos(angle);
    const startY = y1 + radius * Math.sin(angle);

    // 🔥 SHIFT END POINT TO EDGE OF NODE
    const endX = x2 - radius * Math.cos(angle);
    const endY = y2 - radius * Math.sin(angle);

    const length = Math.hypot(endX - startX, endY - startY);
    
    line.style.opacity = "0.7";
line.style.borderRadius = "2px";
    line.style.zIndex = "1";
    line.style.position = "absolute";
    line.style.left = startX + "px";
    line.style.top = startY + "px";
    line.style.width = length + "px";
    line.style.height = "3px";
    line.style.background = "linear-gradient(to right, #6366f1, #818cf8)";
    line.style.transformOrigin = "0 0";
    line.style.transform = `rotate(${angle * 180 / Math.PI}deg)`;

    document.getElementById("edges").appendChild(line);
}

function drawTree(steps) {

    const tree = document.getElementById("tree");
    document.getElementById("nodes").innerHTML = "";
document.getElementById("edges").innerHTML = "";

    let positions = {};
    
    const spacing = Math.min(100, treeWidth / totalLeaves);
    const totalLeaves = steps.filter(s => s.type === "count").length;
    const treeWidth = document.getElementById("tree").offsetWidth;
const startX = treeWidth / 2 - (totalLeaves * spacing) / 2;
    let index = 0;

    for (let step of steps) {

        // 🔹 LEAF NODES
        if (step.type === "count") {

            const x = startX + index * spacing;
            const y = 300;

            createNode(step.id, step.freq, x, y);

            positions[step.id] = { x, y };

            index++;
        }

        // 🔹 MERGE NODES
        else if (step.type === "merge") {

            const left = positions[step.left];
            const right = positions[step.right];

            if (!left || !right) continue;

            const offset = 80;

const xLeft = left.x - offset;
const xRight = right.x + offset;

const x = (xLeft + xRight) / 2;
            const y = left.y - 100;
            createNode(step.parent, step.freq, x, y);

            positions[step.parent] = { x, y };

            drawLine(left.x, left.y, x, y);
            drawLine(right.x, right.y, x, y);
        }
    }
}

loadTree();

</script>

{% endblock %}
